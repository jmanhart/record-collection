name: Sync Discogs Collection

on:
  schedule:
    - cron: '0 17 * * *' # Daily at 9am PST
  workflow_dispatch: # Allow manual trigger

env:
  SENTRY_CRONS_URL: https://o4508215900766208.ingest.us.sentry.io/api/4509834064166912/cron/sync-discogs-collection/8083211186186ef765078486adc736af/

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sentry Crons check-in (in_progress)
        run: |
          CHECK_IN_ID="$(uuidgen)"
          curl -sS "${SENTRY_CRONS_URL}?check_in_id=${CHECK_IN_ID}&status=in_progress"
          echo "CHECK_IN_ID=$CHECK_IN_ID" >> "$GITHUB_ENV"

      - name: Sync Discogs collection
        run: npm run sync:discogs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCOGS_USER: ${{ secrets.DISCOGS_USER }}
          PUBLIC_DISCOGS_API_TOKEN: ${{ secrets.PUBLIC_DISCOGS_API_TOKEN }}

      - name: Sentry Crons check-in (ok)
        if: success()
        run: curl -sS "${SENTRY_CRONS_URL}?check_in_id=${CHECK_IN_ID}&status=ok"

      - name: Sentry Crons check-in (error)
        if: failure()
        run: curl -sS "${SENTRY_CRONS_URL}?check_in_id=${CHECK_IN_ID}&status=error"
